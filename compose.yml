services:
  api:
    mem_limit: "${API_MEM_LIMIT:-2g}"
    user: "1000:1000"
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "${PORT:-9111}:${PORT:-9111}"
    environment:
      # Genie
      GENIE_ENV: "${GENIE_ENV:-dev}"
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-9111}"
      QUERY_DB_MEMORY_BUDGET_MB: "${QUERY_DB_MEMORY_BUDGET_MB:-256}"
      QUERY_DB_ESTIMATED_BYTES_PER_POINT: "${QUERY_DB_ESTIMATED_BYTES_PER_POINT:-256}"

      # IMPORTANT: In Docker + bind-mount environments (especially on WSL/Windows),
      # Revise/AutoReload can trigger continuous re-inference/recompile loops.
      # This manifests as ~100% CPU burn even when the server is "idle".
      JULIA_REVISE: "off"
      GENIE_AUTORELOAD: "false"
      GENIE_AUTO_RELOAD: "false"
      JULIA_DEPOT_PATH: "/julia_depot"
      # Optional: keep idle behavior predictable
      JULIA_NUM_THREADS: "${JULIA_NUM_THREADS:-1}"
      # supercollider
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
      QT_QPA_PLATFORM: "minimal"
      QT_OPENGL: "software"
      LIBGL_ALWAYS_SOFTWARE: "1"
    # Mount ONLY backend sources to avoid unnecessary file scanning/invalidation.
    # We do NOT mount bin/ to avoid Windows/WSL losing executable bits.
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./bootstrap.jl:/app/bootstrap.jl
      - ./routes.jl:/app/routes.jl
      - ./Project.toml:/app/Project.toml
      - ./Manifest.toml:/app/Manifest.toml
      - ./scripts/start_server.jl:/app/scripts/start_server.jl
    command: ["julia", "--project=.", "scripts/start_server.jl"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      # File watching in Docker/WSL is often unreliable without polling
      CHOKIDAR_USEPOLLING: "true"

      # If you use proxy in Vite config, this can be referenced
      VITE_API_TARGET: "http://api:${PORT:-9111}"

      # Frontend toggle: run generate_polyphonic on GitHub Actions or hosting server
      VITE_RUN_GENERATE_POLYPHONIC_ON_GITHUB_ACTIONS: "${RUN_GENERATE_POLYPHONIC_ON_GITHUB_ACTIONS:-true}"

    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules

    command:
      - bash
      - -lc
      - |
        if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then
          npm ci
        fi
        exec npm run dev -- --host 0.0.0.0 --port 5173

  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    environment:
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      retries: 5
  influx_init:
    user: "1000:1000"
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    depends_on:
      - influxdb
    volumes:
      - ./scripts/seed_influx.jl:/app/scripts/seed_influx.jl
    command: ["julia", "--project=.", "scripts/seed_influx.jl"]

volumes:
  web_node_modules:
  influxdb_data:
